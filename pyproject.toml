[project]
name = "chatbot"
version = "0.1.0"
description = ""
authors = [
    {name = "Matias Torres",email = "mtri21019@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi (>=0.135.1,<0.136.0)",
    "uvicorn (>=0.42.0,<0.43.0)",
    "mcp (>=1.26.0,<2.0.0)",
    "sqlalchemy (>=2.0.48,<3.0.0)",
    "aiomysql (>=0.3.2,<0.4.0)"
]

[tool.poetry]
packages = [{include = "chatbot", from = "src"}]

[tool.poetry.scripts]
start = "chatbot.main:start"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
