name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela runs viejos de la misma rama si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Mínimo privilegio: el CI solo lee el repo, no necesita escribir nada.
permissions:
  contents: read

jobs:
  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Instalar Python 3.13
        run: uv python install 3.13

      - name: Sincronizar dependencias (incluye grupo dev)
        run: uv sync --group dev

      # El umbral de coverage (fail_under = 80) vive en pyproject.toml,
      # así que este paso falla si la cobertura baja de ese mínimo.
      - name: Correr tests con coverage
        run: uv run pytest --cov=chatbot --cov-report=term-missing

  lint:
    name: Lint + formato (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Instala la ruff fijada en el grupo dev (uv.lock), NO la última de uvx:
      # así CI y local usan exactamente la misma versión y no rompe sola.
      - name: Sincronizar dependencias (incluye grupo dev)
        run: uv sync --group dev

      - name: Ruff check (lint)
        run: uv run ruff check src tests

      - name: Ruff format (verificar formato)
        run: uv run ruff format --check src tests

  secrets:
    name: Escaneo de secretos (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historial completo para escanear todos los commits

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  audit:
    name: Vulnerabilidades en dependencias (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Exportar dependencias a requirements.txt
        run: uv export --no-emit-project --no-hashes --format requirements-txt > requirements.txt

      # Gate estricto: si aparece una CVE en las dependencias, el CI falla.
      # Si una vulnerabilidad no tiene fix publicado, suprimila puntualmente con
      # --ignore-vuln <ID> y un comentario con fecha y motivo (no vuelvas a
      # poner continue-on-error). El --python 3.13 es necesario porque el
      # dry-run de pip-audit resuelve deps que exigen 3.13 (ej: audioop-lts).
      - name: pip-audit
        run: uvx --python 3.13 pip-audit -r requirements.txt
